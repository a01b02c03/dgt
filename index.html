<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>drive-test.eu</title>
    <style>
      html, body { margin: 0; height: 100%; overflow: hidden; }
      #renderCanvas { width: 100%; height: 100%; touch-action: none; }

      #hud {
        position: fixed;
        inset: 0;
        pointer-events: none;
        font-family: system-ui, sans-serif;
        color: #f5f5f5;
      }
      .hud-panel {
        position: absolute;
        background: rgba(15, 15, 20, 0.65);
        border-radius: 8px;
        padding: 10px 14px;
        font-size: 14px;
      }
      #hud-speedometer { bottom: 20px; right: 20px; text-align: right; }
      #hud-speed-value { font-size: 32px; font-weight: 700; }
      #hud-speed-limit { display: block; margin-top: 4px; font-size: 13px; opacity: 0.85; }

      #hud-maneuvers { top: 20px; left: 20px; margin: 0; list-style: none; max-width: 280px; }
      .hud-maneuver {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        padding: 4px 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      }
      .hud-maneuver:last-child { border-bottom: none; }
      .hud-maneuver-badge { font-size: 12px; font-weight: 600; padding: 1px 6px; border-radius: 4px; }
      .hud-maneuver--pending .hud-maneuver-badge { background: #55555a; color: #ddd; }
      .hud-maneuver--active .hud-maneuver-badge { background: #d9a441; color: #201700; }
      .hud-maneuver--completed .hud-maneuver-badge { background: #4a7fd1; color: #fff; }
      .hud-maneuver--pass .hud-maneuver-badge { background: #2fae5c; color: #04220f; }
      .hud-maneuver--fail .hud-maneuver-badge { background: #d1452f; color: #240600; }

      #license-panel {
        top: 20px;
        right: 20px;
        pointer-events: auto;
        min-width: 220px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      #license-status { font-weight: 600; }
      .license-status--free { color: #ddd; }
      .license-status--pro { color: #2fae5c; }
      #license-panel form { display: flex; gap: 6px; }
      #license-panel form[hidden] { display: none; }
      #license-panel input {
        flex: 1;
        min-width: 0;
        padding: 4px 6px;
        border-radius: 4px;
        border: 1px solid rgba(255, 255, 255, 0.3);
        background: rgba(255, 255, 255, 0.08);
        color: #f5f5f5;
        font-size: 13px;
      }
      #license-panel button {
        padding: 4px 10px;
        border-radius: 4px;
        border: none;
        background: #4a7fd1;
        color: #fff;
        font-size: 13px;
        cursor: pointer;
      }
      #license-message { font-size: 12px; opacity: 0.85; min-height: 1em; }
    </style>
  </head>
  <body>
    <canvas id="renderCanvas"></canvas>
    <div id="hud">
      <ul id="hud-maneuvers" class="hud-panel"></ul>
      <div id="hud-speedometer" class="hud-panel">
        <span id="hud-speed-value">0</span> km/h
        <span id="hud-speed-limit">Límite: -- km/h</span>
      </div>
      <div id="license-panel" class="hud-panel">
        <span id="license-status">Versión gratuita</span>
        <form id="license-checkout-form">
          <input id="license-email-input" type="email" placeholder="tu@email.com" required />
          <button type="submit">Comprar Pro</button>
        </form>
        <form id="license-activate-form">
          <input id="license-key-input" type="text" placeholder="XXXX-XXXX-XXXX-XXXX" required />
          <button type="submit">Activar</button>
        </form>
        <span id="license-message"></span>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
